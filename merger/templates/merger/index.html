{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Merge System</title>
    <link rel="stylesheet" href="{% static 'merger/css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>
<body class="index-body">
    <header>
        <h1>File Merge System</h1>
        <nav>
            <a href="/">Home (Merge)</a>
            <a href="/history">Merge History</a>
        </nav>
    </header>

    <div class="container">
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" enctype="multipart/form-data" id="merge-form">
            {% csrf_token %}
            <div class="field">
                <label for="job_name">Pdf Name (optional):</label>
                <input type="text" name="job_name" id="job_name" placeholder="e.g. My Merged Document">
            </div>

            <div class="field">
                <label for="merge_type">File Type:</label>
                <select name="merge_type" id="merge_type" required>
                    <option value="PDF">PDF-(Include DOCK) to PDF </option>
                    <option value="CSV">CSV Marge</option>
                    <option value="EXCEL">Excel (.xlsx)</option>
                </select>
            </div>

            <div class="field">
                <label for="files">Select Files:</label>
                <input type="file" name="files" id="files" multiple required accept=".pdf,.docx,.csv,.xlsx">
                <small style="color: #666; display: block; margin-top: 5px;">Support: PDF, DOCX, CSV, Excel. Drag to reorder.</small>
            </div>

            <div id="file-list-container" style="display:none;">
                <label>Selected Files & Previews:</label>
                <div id="file-list"></div>
            </div>

            <input type="hidden" name="file_order" id="file_order">
            <input type="hidden" name="page_ranges" id="page_ranges">

            <button type="submit" style="margin-top: 20px; width: 100%;">Merge and Save</button>
        </form>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('files');
        const fileList = document.getElementById('file-list');
        const fileListContainer = document.getElementById('file-list-container');
        const mergeForm = document.getElementById('merge-form');
        const fileOrderInput = document.getElementById('file_order');
        const pageRangesInput = document.getElementById('page_ranges');
        const mergeTypeSelect = document.getElementById('merge_type');

        fileInput.addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            if (files.length > 0) {
                fileListContainer.style.display = 'block';
                fileList.innerHTML = '';
                
                for (let i = 0; i < files.length; i++) {
                    const file = files[i];
                    const item = document.createElement('div');
                    item.className = 'file-item';
                    item.dataset.index = i;
                    
                    const ext = file.name.split('.').pop().toLowerCase();
                    const isPdf = ext === 'pdf';
                    const isDocx = ext === 'docx';
                    
                    item.innerHTML = `
                        <div class="file-header">
                            <span class="drag-handle">☰</span>
                            <div class="file-info">${file.name}</div>
                        </div>
                        <div class="pages-preview" id="preview-${i}">
                            <div class="pages-container">Loading preview...</div>
                        </div>
                        <input type="hidden" class="page-selection-input" value="all">
                    `;
                    fileList.appendChild(item);

                    if (isPdf) {
                        renderPdfThumbnails(file, i);
                    } else if (isDocx) {
                        renderDocxPreview(file, i);
                    } else {
                        document.querySelector(`#preview-${i} .pages-container`).innerHTML = '<p>No preview for this type.</p>';
                    }
                }

                new Sortable(fileList, {
                    animation: 150,
                    handle: '.drag-handle',
                    ghostClass: 'sortable-ghost'
                });
            } else {
                fileListContainer.style.display = 'none';
            }
        });

        async function renderPdfThumbnails(file, fileIndex) {
            const container = document.querySelector(`#preview-${fileIndex} .pages-container`);
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
                container.innerHTML = '';
                const selectedPages = new Set();
                for(let p=1; p<=pdf.numPages; p++) selectedPages.add(p);

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 0.2 });
                    const canvas = document.createElement('canvas');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport }).promise;

                    const thumb = createThumb(canvas, pageNum, true);
                    container.appendChild(thumb);
                    thumb.onclick = () => togglePage(thumb, pageNum, selectedPages, fileIndex, pdf.numPages);
                }
                updateHiddenInput(fileIndex, selectedPages, pdf.numPages);
            };
            reader.readAsArrayBuffer(file);
        }

        function renderDocxPreview(file, fileIndex) {
            const container = document.querySelector(`#preview-${fileIndex} .pages-container`);
            const reader = new FileReader();
            reader.onload = function(e) {
                mammoth.convertToHtml({arrayBuffer: e.target.result})
                    .then(result => {
                        container.innerHTML = `<div class="docx-preview">${result.value}</div>`;
                    })
                    .catch(err => { container.innerHTML = 'Error loading DOCX'; });
            };
            reader.readAsArrayBuffer(file);
        }

        function createThumb(el, num, selected) {
            const thumb = document.createElement('div');
            thumb.className = `page-thumb ${selected ? 'selected' : ''}`;
            thumb.innerHTML = `<div class="selection-badge">✓</div><div class="page-number">${num}</div>`;
            thumb.prepend(el);
            return thumb;
        }

        function togglePage(thumb, pageNum, selectedPages, fileIndex, total) {
            if (selectedPages.has(pageNum)) {
                selectedPages.delete(pageNum);
                thumb.classList.remove('selected');
            } else {
                selectedPages.add(pageNum);
                thumb.classList.add('selected');
            }
            updateHiddenInput(fileIndex, selectedPages, total);
        }

        function updateHiddenInput(fileIndex, selectedPages, totalPages) {
            const input = document.querySelector(`.file-item[data-index="${fileIndex}"] .page-selection-input`);
            input.value = selectedPages.size === totalPages ? 'all' : (selectedPages.size === 0 ? 'none' : Array.from(selectedPages).sort((a,b)=>a-b).join(','));
        }

        mergeForm.addEventListener('submit', function() {
            const items = Array.from(fileList.querySelectorAll('.file-item'));
            fileOrderInput.value = items.map(item => item.dataset.index).join(',');
            pageRangesInput.value = JSON.stringify(items.map(item => item.querySelector('.page-selection-input').value === 'none' ? '' : item.querySelector('.page-selection-input').value));
        });
    </script>
</body>
</html>
